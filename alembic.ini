# CairnBooks — Alembic configuration
# Run migrations from the repo root:
#   alembic upgrade head        # apply all pending migrations
#   alembic downgrade -1        # roll back one step
#   alembic current             # show applied revision
#   alembic revision -m "..."   # generate a new (empty) migration
#   alembic revision --autogenerate -m "..."   # generate from model diff

[alembic]
# Path to the migration scripts, relative to this file.
script_location = alembic

# File naming template for new revision scripts.
# %%(rev)s  = short revision id
# %%(slug)s = slugified message
file_template = %%(rev)s_%%(slug)s

# Prepend this path to sys.path so `from cairnbooks.db import Base` works.
prepend_sys_path = src

# Alembic timezone (leave blank for local time).
# timezone =

path_separator = os

# Default database URL for local development.
# At runtime this is overridden by the DATABASE_URL environment variable (see
# alembic/env.py).
sqlalchemy.url = postgresql+asyncpg://cairnbooks:cairnbooks@localhost:5432/cairnbooks


# ---------------------------------------------------------------------------
# Post-write hooks (optional code-quality tools on new revision files)
# ---------------------------------------------------------------------------
[post_write_hooks]
# Uncomment to auto-format new migration files with ruff:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
